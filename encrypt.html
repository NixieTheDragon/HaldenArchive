<!DOCTYPE html>
<html>
<head>
  <title>Encrypt Log</title>
</head>
<body>
  <h2>Encrypt Log Text</h2>

  <textarea id="plainText" placeholder="Paste log text here" rows="10" cols="80"></textarea><br><br>
  <input id="password" placeholder="Password" type="password"><br><br>
  <button onclick="encryptText()">Encrypt</button>

  <h3>Encrypted Output</h3>
  <textarea id="output" rows="10" cols="80"></textarea>

<script>
async function getKey(password, salt) {
  const enc = new TextEncoder();

  const keyMaterial = await crypto.subtle.importKey(
    "raw",
    enc.encode(password),
    "PBKDF2",
    false,
    ["deriveKey"]
  );

  return crypto.subtle.deriveKey(
    {
      name: "PBKDF2",
      salt,
      iterations: 250000,
      hash: "SHA-256"
    },
    keyMaterial,
    { name: "AES-GCM", length: 256 },
    false,
    ["encrypt", "decrypt"]
  );
}

function arrayBufferToBase64(buffer) {
  return btoa(String.fromCharCode(...new Uint8Array(buffer)));
}

async function encryptText() {
  const text = document.getElementById("plainText").value;
  const password = document.getElementById("password").value;

  const enc = new TextEncoder();
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv = crypto.getRandomValues(new Uint8Array(12));

  const key = await getKey(password, salt);

  const encrypted = await crypto.subtle.encrypt(
    { name: "AES-GCM", iv },
    key,
    enc.encode(text)
  );

  const package = {
    salt: arrayBufferToBase64(salt),
    iv: arrayBufferToBase64(iv),
    data: arrayBufferToBase64(encrypted)
  };

  document.getElementById("output").value = JSON.stringify(package);
}
</script>
</body>
</html>
